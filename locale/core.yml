        如果是你本人操作，只需点击下面的链接即可激活你的账号：
        {url}

        如果你没有注册，请忽略此邮件。
    confirm_email:
      subject: 确认你的新邮箱地址
      body: |
        有人（希望是你！）在 {forum} 将邮箱地址更改为此地址。

        如果是你本人操作，只需点击下面的链接即可确认你的邮箱：
        {url}

        如果不是你本人操作，请忽略此邮件。
    reset_password:
      subject: => core.ref.reset_your_password
      body: |
        有人（希望是你！）为你在 {forum} 的账号提交了忘记密码请求。

        如果是你本人操作，请点击下面的链接重置密码：
        {url}

        如果你不想更改密码，直接忽略此邮件即可，什么也不会发生。
    send_test:
      subject: Flarum 邮件测试
      body: |
        这是一封测试邮件，用于确认你的 Flarum 邮件配置正常工作。

        如果是你本人操作，这封邮件意味着你的配置可用！

        如果不是你本人操作，请忽略此邮件。
