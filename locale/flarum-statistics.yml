# 对应 Flarum 2.0.0-beta.8

flarum-statistics:
  ##
  # UNIQUE KEYS - The following keys are used in only one location each.
  ##

  # Translations in this namespace are used by the admin interface.
  admin:
    # These translations are used in the date selection modal.
    date_selection_modal:
      description: |
        选择自定义日期范围以显示统计数据。活跃度较高的论坛加载数据可能需要
        几分钟。
      end_date: 结束日期（含）
      errors:
        end_before_start: 结束日期必须晚于开始日期。
      start_date: 开始日期（含）
      submit_button: 确认日期范围
      title: 选择自定义日期范围

    # These translations are used in the Statistics dashboard widget.
    statistics:
      discussions_heading: => core.ref.discussions
      export_chart_button: 导出图表为 SVG
      last_12_months_label: 最近 12 个月
      last_28_days_label: 最近 28 天
      last_7_days_label: 最近 7 天
      mini_heading: 论坛统计
      previous_28_days_label: 前 28 天
      previous_7_days_label: 前 7 天
      custom_label: 选择自定义范围...
      custom_label_specified: "{fromDate} 至 {toDate}"
      loading: => core.ref.loading
      posts_heading: => core.ref.posts
      today_label: 今天
      total_label: 总计
      users_heading: => core.ref.users
      view_full: 查看更多统计
      no_data: 此日期范围内暂无数据。
      current_period: 当前周期
      previous_period: 上一周期
