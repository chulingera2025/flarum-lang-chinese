<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 128 128"
    role="img"
    aria-labelledby="title"
>
  <title>中文语言包</title>
  <defs>
    <polygon
            id="star"
            points="0,-50 11.23,-15.45 47.55,-15.45 18.16,5.9 29.39,40.45 0,19.1 -29.39,40.45 -18.16,5.9 -47.55,-15.45 -11.23,-15.45"
        />
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow
                dx="0"
                dy="3"
                stdDeviation="4"
                flood-color="#7f120a"
                flood-opacity="0.3"
            />
    </filter>
  </defs>

  <rect
        x="8"
        y="8"
        width="112"
        height="112"
        rx="24"
        fill="#DE2910"
        filter="url(#shadow)"
    />

  <g fill="#FFDE00">
    <use href="#star" transform="translate(36 38) scale(0.34)" />
    <use href="#star" transform="translate(62 23) rotate(25) scale(0.11)" />
    <use href="#star" transform="translate(75 35) rotate(5) scale(0.11)" />
    <use href="#star" transform="translate(74 52) rotate(-18) scale(0.11)" />
    <use href="#star" transform="translate(61 64) rotate(-38) scale(0.11)" />
  </g>
</svg>
